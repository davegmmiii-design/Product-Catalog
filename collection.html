<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection — Primrose Coffee</title>
    <meta name="description"
        content="Browse our curated collection of premium Ethiopian single-origin coffees. Highland Washed, Mountain Natural, and Forest Honey varieties.">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="preloader">
        <div class="preloader__logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--color-teal)" stroke-width="1.5" width="80" height="80">
                <path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM6 1v3M10 1v3M14 1v3"
                    stroke-linecap="round" stroke-linejoin="round" />
            </svg>
        </div>
        <div class="preloader__bar-container">
            <div class="preloader__bar"></div>
        </div>
    </div>

    <!-- Sticky Header -->
    <header class="page-header" id="top">
        <div class="lang-selector-container">
            <button class="lang-selector" aria-label="Select language" onclick="toggleLangMenu()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="lang-selector__globe"
                    width="20" height="20">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="2" y1="12" x2="22" y2="12" />
                    <path
                        d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                </svg>
                <span id="current-lang">EN</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    class="lang-selector__chevron">
                    <path d="M6 9l6 6 6-6" />
                </svg>
            </button>
            <div class="lang-menu" id="lang-menu">
                <button onclick="changeLanguage('en')">English</button>
                <button onclick="changeLanguage('ar')">العربية</button>
                <button onclick="changeLanguage('zh')">中文</button>
                <button onclick="changeLanguage('ja')">日本語</button>
                <button onclick="changeLanguage('ko')">한국어</button>
            </div>
        </div>
        <div class="header-spacer"></div>
        <span class="page-header__brand reveal">PRIMROSE</span>
    </header>

    <!-- Breadcrumb -->
    <nav class="breadcrumb">
        <a href="index.html" data-i18n="navHome">HOME</a>
        <span> › </span>
        <span data-i18n="navCollection">COLLECTION</span>
    </nav>

    <!-- Product Grid -->
    <main class="product-grid" id="products-grid">
        <!-- Products injected by JS -->
    </main>

    <!-- Footer -->

        <button class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" data-i18n="backToTop">
            BACK TO TOP
        </button>
