<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Primrose Coffee — Finest Speciality Coffee Beans</title>
  <meta name="description"
    content="Export-grade single-origin coffees curated for the world's most discerning buyers. Premium Ethiopian coffee from Primrose.">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <section class="hero" id="top">
    <!-- Background Image -->
    <div class="hero__bg">
      <img src="images/cf001.jpg" alt="Ethiopian coffee plantation">
    </div>

    <!-- Top Bar -->
    <div class="hero__topbar">
      <div class="lang-selector-container">
        <button class="lang-selector" aria-label="Select language" onclick="toggleLangMenu()">
          <span id="current-lang">EN</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 9l6 6 6-6" />
          </svg>
        </button>
        <div class="lang-menu" id="lang-menu">
          <button onclick="changeLanguage('en')">English</button>
          <button onclick="changeLanguage('ar')">العربية</button>
          <button onclick="changeLanguage('zh')">中文</button>
          <button onclick="changeLanguage('ja')">日本語</button>
          <button onclick="changeLanguage('ko')">한국어</button>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="hero__content">
      <!-- Logo in White Box -->
      <div class="hero__logo-box">
        <img src="Primrose Logo.png" alt="Primrose Coffee Logo">
      </div>

      <p class="text-brand hero__brand">Primrose Coffee</p>
      <h1 class="text-heading hero__title" data-i18n="title">Finest speciality<br>coffee beans</h1>
      <p class="hero__subtitle" data-i18n="subtitle">Export-grade single-origin coffees curated for the world's most
        discerning buyers.</p>

      <a href="collection.html" class="hero__cta" data-i18n="viewCollection">
        View Collection
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
          stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12" />
          <polyline points="12 5 19 12 12 19" />
        </svg>
      </a>
    </div>

    <!-- Side Text (Vertical) -->
    <div class="hero__side-text">
      <span data-i18n="estText">EST. 2010 • ETHIOPIA</span>
    </div>

    <!-- Footer Social Icons -->
    <div class="hero__footer">
      <a href="mailto:Primroseplc@gmail.com" class="social-icon" aria-label="Email">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="2" y="4" width="20" height="16" rx="2" />
          <polyline points="22,4 12,13 2,4" />
        </svg>
      </a>
      <a href="https://instagram.com" class="social-icon" target="_blank" rel="noopener" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="2" y="2" width="20" height="20" rx="5" />
          <circle cx="12" cy="12" r="5" />
          <circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none" />
        </svg>
      </a>
      <a href="https://wa.me/251911513747" class="social-icon" target="_blank" rel="noopener" aria-label="WhatsApp">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />

    </div>
  </section>

  <script src="translations.js"></script>
  <script src="app.js"></script>

</html>
