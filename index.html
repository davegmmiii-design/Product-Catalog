<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Primrose Coffee — Finest Speciality Coffee Beans</title>
  <meta name="description"
    content="Export-grade single-origin coffees curated for the world's most discerning buyers. Premium Ethiopian coffee from Primrose.">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <section class="hero" id="top">
    <!-- Background Image -->
    <div class="hero__bg">
      <img src="images/cf001.jpg" alt="Ethiopian coffee plantation">
    </div>

    <!-- Top Bar -->
    <div class="hero__topbar">
      <div class="lang-selector-container">
        <button class="lang-selector" aria-label="Select language" onclick="toggleLangMenu()">
          <span id="current-lang">EN</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 9l6 6 6-6" />
          </svg>
        </button>
        <div class="lang-menu" id="lang-menu">
          <button onclick="changeLanguage('en')">English</button>
          <button onclick="changeLanguage('ar')">العربية</button>
          <button onclick="changeLanguage('zh')">中文</button>
          <button onclick="changeLanguage('ja')">日本語</button>
          <button onclick="changeLanguage('ko')">한국어</button>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="hero__content">
      <!-- Logo in White Box -->
      <div class="hero__logo-box">
        <img src="Primrose Logo.png" alt="Primrose Coffee Logo">
      </div>

      <h1 class="text-heading hero__title" data-i18n="title">Finest speciality<br>coffee beans</h1>
      <p class="hero__subtitle" data-i18n="subtitle">Export-grade single-origin coffees curated for the world's most
        discerning buyers.</p>

      <a href="collection.html" class="hero__cta" data-i18n="viewCollection">
        View Collection
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
          stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12" />
          <polyline points="12 5 19 12 12 19" />
        </svg>
      </a>
    </div>

    <!-- Side Text (Vertical) -->
    <div class="hero__side-text">
      <span data-i18n="estText">EST. 2010 • ETHIOPIA</span>
    </div>

    <!-- Footer Social Icons -->
    <div class="hero__footer">
      <a href="mailto:Primroseplc@gmail.com" class="social-icon" aria-label="Gmail">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M24 5.457v13.909c0 .904-.732 1.634-1.634 1.634h-3.819V11.48L12 16.52l-6.547-5.04v9.52H1.634A1.634 1.634 0 0 1 0 19.366V5.457c0-1.29 1.454-2.022 2.474-1.227L12 11.242l9.526-7.012c1.02-.795 2.474-.063 2.474 1.227z" />

</html>
