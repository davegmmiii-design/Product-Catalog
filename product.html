<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Product Detail — Primrose Coffee</title>
    <meta name="description"
        content="Detailed profile of premium Ethiopian specialty coffee. View origin, variety, processing, and tasting notes.">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="preloader">
        <div class="preloader__logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--color-teal)" stroke-width="1.5" width="80" height="80">
                <path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM6 1v3M10 1v3M14 1v3"
                    stroke-linecap="round" stroke-linejoin="round" />
            </svg>
        </div>
        <div class="preloader__bar-container">
            <div class="preloader__bar"></div>
        </div>
    </div>

    <!-- Sticky Header -->
    <header class="detail-header" id="top">
        <a href="collection.html" class="detail-header__back" aria-label="Back to collection">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12" />
                <polyline points="12 19 5 12 12 5" />
            </svg>
        </a>
        <div class="lang-selector-container">
            <button class="lang-selector" aria-label="Select language" onclick="toggleLangMenu()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"
                    class="lang-selector__globe">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="2" y1="12" x2="22" y2="12" />
                    <path
                        d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                </svg>
                <span id="current-lang">EN</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"
                    class="lang-selector__chevron">
                    <path d="M6 9l6 6 6-6" />
                </svg>
            </button>
            <div class="lang-menu" id="lang-menu">
                <button onclick="changeLanguage('en')">English</button>
                <button onclick="changeLanguage('ar')">العربية</button>
                <button onclick="changeLanguage('zh')">中文</button>
                <button onclick="changeLanguage('ja')">日本語</button>
                <button onclick="changeLanguage('ko')">한국어</button>
            </div>
        </div>
        <span class="detail-header__title" id="header-title"></span>
        <button class="detail-header__share" aria-label="Share" onclick="shareProduct()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <circle cx="18" cy="5" r="3" />
                <circle cx="6" cy="12" r="3" />
                <circle cx="18" cy="19" r="3" />
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
            </svg>
        </button>
    </header>

    <!-- Product Content -->
    <main id="product-content">
        <!-- Injected by JS -->
    </main>

    <!-- Footer -->
    <footer class="page-footer">
        <div class="footer-social" id="footer-social">
            <!-- Social icons injected by JS -->
        </div>

        <button class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round">
                <line x1="12" y1="19" x2="12" y2="5" />
                <polyline points="5 12 12 5 19 12" />
            </svg>
            <span data-i18n="backToTop">BACK TO TOP</span>
        </button>

        <div class="footer-copyright" data-i18n="footerTrade">
            Primrose speciality coffee &copy; 2026
        </div>
    </footer>

    <script src="translations.js"></script>
    <script src="app.js"></script>
</body>

</html>
